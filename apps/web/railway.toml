# Este archivo solo aplica si Root Directory = apps/web.
# Config recomendada: Root Directory VACÍO + Dockerfile path apps/web/Dockerfile
[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
startCommand = "nginx -g 'daemon off;'"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
