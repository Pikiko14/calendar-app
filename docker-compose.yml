services:
  postgres:
    image: postgres:16-alpine
    container_name: beautybook-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-beautybook}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-beautybook}
      POSTGRES_DB: ${POSTGRES_DB:-beautybook}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-beautybook}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - beautybook

  redis:
    image: redis:7-alpine
    container_name: beautybook-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - beautybook

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: beautybook-api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-beautybook}:${POSTGRES_PASSWORD:-beautybook}@postgres:5432/${POSTGRES_DB:-beautybook}?schema=public
      REDIS_HOST: redis
      REDIS_PORT: 6379
    ports:
      - "3000:3000"
    volumes:
      - api_uploads:/app/uploads
      - whatsapp_sessions:/app/bot_sessions
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - beautybook

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
      args:
        VITE_API_URL: http://localhost:3000/api/v1
        VITE_APP_URL: http://localhost:5173
    container_name: beautybook-web
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      - api
    networks:
      - beautybook

  nginx:
    image: nginx:1.27-alpine
    container_name: beautybook-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - api
      - web
    networks:
      - beautybook

volumes:
  postgres_data:
  redis_data:
  api_uploads:
  whatsapp_sessions:

networks:
  beautybook:
    driver: bridge
